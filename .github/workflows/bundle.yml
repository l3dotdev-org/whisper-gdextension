name: Bundle Addon

on:
    push:
        branches: [master, main]
    workflow_dispatch:

jobs:
    build_windows:
        uses: l3dotdev-org/whisper-gdextension/.github/workflows/build_x_windows.yml@main
    build_linux:
        uses: l3dotdev-org/whisper-gdextension/.github/workflows/build_x_linux.yml@main
    bundle:
        runs-on: blacksmith-4vcpu-ubuntu-2404
        needs: [build_windows, build_linux]
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Download artifacts
              uses: actions/download-artifact@v8

            - name: Move artifacts
              run: |
                  mkdir -p addon/bin/windows
                  find . -maxdepth 2 -name 'whisper.windows*' -type f -print0 | xargs -0 mv -t addon/bin/windows
                  mkdir -p addon/bin/linux
                  find . -maxdepth 2 -name 'libwhisper.linux*' -type f -print0 | xargs -0 mv -t addon/bin/linux

            - name: Upload artifact
              uses: actions/upload-artifact@v7
              with:
                  name: whisper-gdextension
                  path: addon
                  if-no-files-found: error
